<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>我的 PDF 工具箱</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f7f9; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 500px; margin-bottom: 20px; }
        h2 { color: #333; margin-top: 0; border-left: 5px solid #007bff; padding-left: 10px; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #0056b3; }
        .status { font-size: 0.9em; color: #666; text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <h2>1. PDF 壓縮</h2>
        <form id="compressForm">
            <input type="file" id="compFile" accept=".pdf" required>
            <select id="targetSize">
                <option value="2">壓縮至 2MB 以下</option>
                <option value="5" selected>壓縮至 5MB 以下</option>
            </select>
            <button type="submit">開始優化壓縮</button>
        </form>
        <div id="compStatus" class="status">準備就緒</div>
    </div>

    <div class="container">
        <h2>2. PDF 合併</h2>
        <form id="mergeForm">
            <input type="file" id="mergeFiles" accept=".pdf" multiple required>
            <button type="submit" style="background: #28a745;">開始合併檔案</button>
        </form>
        <div id="mergeStatus" class="status">可同時選取多個檔案</div>
    </div>

    <script>
        // 壓縮處理
        document.getElementById('compressForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const status = document.getElementById('compStatus');
            const formData = new FormData();
            formData.append('file', document.getElementById('compFile').files[0]);
            formData.append('target', document.getElementById('targetSize').value);

            btn.disabled = true; status.innerText = "處理中，請稍候...";
            const res = await fetch('/compress', { method: 'POST', body: formData });
            if(res.ok) {
                const blob = await res.blob();
                download(blob, "optimized.pdf");
                status.innerText = "✅ 壓縮完成！";
            } else { status.innerText = "❌ 失敗"; }
            btn.disabled = false;
        };

        // 合併處理
        document.getElementById('mergeForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const status = document.getElementById('mergeStatus');
            const formData = new FormData();
            const files = document.getElementById('mergeFiles').files;
            for(let f of files) formData.append('files', f);

            btn.disabled = true; status.innerText = "合併中...";
            const res = await fetch('/merge', { method: 'POST', body: formData });
            if(res.ok) {
                const blob = await res.blob();
                download(blob, "merged.pdf");
                status.innerText = "✅ 合併完成！";
            } else { status.innerText = "❌ 失敗"; }
            btn.disabled = false;
        };

        function download(blob, name) {
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = name; a.click();
        }
    </script>
</body>
</html>
